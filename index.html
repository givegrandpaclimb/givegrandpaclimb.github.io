<!doctype html>
<html lang="zh">
<head>
	<link href="/load/pwa-256x256.png" rel="icon" type="image/x-icon"/>
	<link href="/manifest.json" rel="manifest">
	<title>ChatGPT Plus</title>
	<meta charset="UTF-8"/>
	<meta content="width=device-width" name="viewport"/>
  <script>
(async () => {
	const sw = await navigator.serviceWorker.register('./sw.js');
	if (!navigator.serviceWorker.controller) {
		await new Promise(resolve => navigator.serviceWorker.addEventListener('controllerchange', resolve, {once: true}));
	}
	let pwd = localStorage.getItem('key');
	if (!pwd) {
		pwd = prompt('请输入访问密钥');
		if (pwd) localStorage.setItem('key', pwd);
	}
	navigator.serviceWorker.controller.postMessage({
		type: 'SET_KEY',
		password: pwd,
		version: 29744747
	});
	const script = document.createElement('script');
	script.type = 'module';
	script.src = './index.js';
	document.body.appendChild(script);
})();
</script>
  <link rel="stylesheet" crossorigin href="/index.css?19a81b672ad482e600f82bf9778c212b">
</head>
<body>
	<div id="app"></div>
</body>
</html>
