name: 批量清理历史记录
on:
    workflow_dispatch:
jobs:
    clean-history:
        runs-on: ubuntu-latest
        permissions:
            actions: write
        steps:
            -   name: 使用 GitHub CLI 批量删除历史记录
                env:
                    GH_TOKEN: ${{ github.token }}
                run: |
                    current_run_id=${{ github.run_id }}
                    run_ids=$(gh run list --repo ${{ github.repository }} --limit 500 --json databaseId -q '.[].databaseId')
                    for id in $run_ids; do
                        if [ "$id" != "$current_run_id" ]; then
                            echo "正在删除运行记录 ID: $id"
                            gh run delete --repo ${{ github.repository }} "$id" || true
                        fi
                    done
                    echo "清理完成！"