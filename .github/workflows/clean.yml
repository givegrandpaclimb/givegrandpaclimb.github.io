name: 批量清理历史记录
on:
  workflow_dispatch:

jobs:
  clean-history:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: 删除所有运行记录
        uses: Mattravers/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1